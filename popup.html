<!-- popup.html — Style Engine preview popup -->
<div id="sse-preview-popup" class="sse-popup-overlay" style="display:none;">
    <div class="sse-popup">
        <div class="sse-popup-header">
            <h3>✍️ 프롬프트 프리뷰</h3>
            <button id="sse-popup-close" class="sse-popup-close" title="닫기">✕</button>
        </div>
        <div class="sse-popup-body">
            <textarea id="sse-preview-text" class="sse-preview-textarea" readonly
                placeholder="여기에 빌드된 프롬프트가 표시됩니다…"></textarea>
        </div>
        <div class="sse-popup-footer">
            <button id="sse-copy-btn" class="menu_button sse-btn-copy">📋 복사</button>
            <button id="sse-apply-btn" class="menu_button sse-btn-apply">✅ 채팅에 적용</button>
        </div>
    </div>
</div>
